# ============================================================================
# STARTER DRAFT — review & edit before relying on; generated per ADR-028 Item 1
# ============================================================================
#
# Purpose:  Per-persona prompt fragments injected into DESIGN_SKILL and
#           CAPTURE_INTENT by the authorSkill flow (ADR-028 Item 1 Option A).
#           Each stanza is loaded at runtime from this file; no code change is
#           needed to update persona guidance — edit and restart the server.
#
# Domain:   All content is framed for a cloud-based software company that builds
#           and operates a cloud platform for Fusion Applications — an OCI-style
#           platform that provisions, configures, updates, and operates Oracle
#           Fusion SaaS for enterprise customers (ERP, SCM, HCM, EPM, CX).
#           The platform team manages the full lifecycle: provisioning, patching,
#           upgrades (e.g. 26ai quarterly releases), DR drills, fleet health,
#           and customer-facing SLA reporting.
#
# Schema per persona:
#   key_fields:        list[str]  — the 3-6 fields every skill for this persona
#                                   should try to include. These are injected as
#                                   "always attempt to include" hints in
#                                   _DESIGN_SKILL_PROMPT and as "canonical output
#                                   dimensions" in _CAPTURE_INTENT_PROMPT.
#   extraction_style:  str        — tone, granularity, and aggregation expectations.
#                                   Injected into DESIGN_SKILL as instruction context.
#   few_shot_example:  str        — ONE concrete worked example of a well-designed
#                                   field for this persona, grounded in the
#                                   fusion-apps-cloud domain. Injected at the end
#                                   of _DESIGN_SKILL_PROMPT as a worked example block.
#
# Injection points (implemented in ADR-028 code changes):
#   - _CAPTURE_INTENT_PROMPT: receives `persona_key_fields` kwarg
#   - _DESIGN_SKILL_PROMPT:   receives `persona_key_fields`, `persona_extraction_style`,
#                              and `persona_few_shot_example` kwargs
#
# ============================================================================

tpm:
  key_fields:
    - orm_status           # ORM/RAG status (Red / Amber / Green) for the project or milestone
    - rag_summary          # 1-2 sentence exec-safe narrative of overall health
    - schedule_health      # On track / At risk / Delayed with evidence
    - blocking_issues      # Open blockers with owner and target resolution date
    - next_steps           # Committed deliverables for the next period (sprint / week)
    - exec_asks            # Specific asks or decisions required from leadership
  extraction_style: >
    Use exec-safe language throughout — no jargon, no internal code names without
    expansion, no ambiguous acronyms. RAG status (Red/Amber/Green) must always be
    accompanied by a 1-sentence justification. Risks should be stated as "X is at
    risk because Y; mitigation is Z." Next steps must be time-bound (by [date] or
    "this sprint"). Keep field values concise: the audience is a VP or above reading
    a weekly status deck in under 2 minutes. Aggregation: when multiple Confluence
    pages or Jira epics cover the same program, synthesise a single programme-level
    view — do not dump per-project details. Cadence: weekly. Avoid passive voice.
  few_shot_example: |
    Field name: "blocking_issues"
    Type: array of objects
    Description: >
      List every open blocker for the 26ai FA DB upgrade program. For each blocker,
      extract: (1) a one-line description of the issue, (2) the owner team or named
      individual, (3) the target resolution date if stated, and (4) whether it is
      on the critical path. Derive blockers from the "Blockers / Risks" section of
      the weekly ops Confluence page; if none is labelled explicitly, synthesise
      from action items flagged as "blocked" or "waiting on". If no blockers exist,
      return an empty array — do not fabricate entries.
    Example extracted value:
      - description: "26ai pod patching blocked on OCI Compute quota increase request"
        owner: "Infra Ops"
        target_resolution: "2026-05-22"
        critical_path: true
      - description: "DR drill sign-off pending Legal review of RTO SLA amendment"
        owner: "TPM - S. Kumar"
        target_resolution: "2026-05-29"
        critical_path: false

pm:
  key_fields:
    - release_scope        # Features / epics in scope for this release
    - release_status       # Phase (planning / in-dev / code-freeze / released) + date
    - known_risks          # Top 3 risks with probability and impact for the release
    - go_nogo_criteria     # Explicit go/no-go criteria and current status of each
    - stakeholder_asks     # Asks or dependencies from other teams (Infra, Security, etc.)
    - customer_impact      # Customer-facing impact statement (used in release notes)
  extraction_style: >
    Product-management lens: focus on user value, release readiness, and risk.
    Avoid engineering-implementation detail (commits, build IDs, test counts) unless
    they directly affect release readiness. Release status should be a single
    human-readable phrase. Known risks should be ranked by probability × impact.
    Go/no-go criteria must be boolean-checkable (each criterion is either met, not
    met, or in progress). Customer-impact statements should be written in the voice
    of a release note: "Customers will now be able to..." Cadence: per-release cycle
    (not weekly). Use present tense for current status, future tense for upcoming.
  few_shot_example: |
    Field name: "go_nogo_criteria"
    Type: array of objects
    Description: >
      Extract each formal go/no-go criterion for the 25.01 Fusion Applications
      quarterly release. For each criterion: (1) the criterion text as stated in
      the release checklist Confluence page, (2) current status (met / not_met /
      in_progress), and (3) owner team. If the source lists criteria under a
      "Release Readiness" or "Exit Gates" heading, use those verbatim. If no
      formal list exists, infer from action items tagged "release blocker" in Jira.
      Do not fabricate criteria.
    Example extracted value:
      - criterion: "All P0/P1 Jira issues resolved or deferred with PM sign-off"
        status: "in_progress"
        owner: "PM"
      - criterion: "Security pen-test sign-off received from Cloud Security"
        status: "met"
        owner: "Cloud Security"
      - criterion: "Customer-facing release notes reviewed and approved by Docs"
        status: "not_met"
        owner: "Docs Team"

architect:
  key_fields:
    - decision_summary     # One-line statement of the architectural decision made
    - rationale            # Why this option was chosen (2-3 sentences)
    - alternatives_rejected # Options considered and why each was rejected
    - consequences         # Positive and negative consequences; reversibility
    - affected_components  # Framework modules / services directly changed by this decision
    - open_questions       # Unresolved design questions or risks flagged for follow-up
  extraction_style: >
    Technical precision above all. Do not simplify or rephrase technical terms —
    the audience is senior engineers and architects who will implement from this
    document. Rationale must reference the framework's core principles (spec §2):
    polyglot storage, deterministic extraction, LLM-in-ingestion vs LLM-in-retrieval
    separation, etc. Alternatives must be specific — "Option B" with a name, not
    vague. Consequences should separate positive from negative explicitly.
    Reversibility is a required field for every decision. Affected-components should
    reference the spec §5 component map names (core/, adapters/, parsers/, stores/,
    retrievers/, orchestrator/). Cadence: per decision event, not periodic.
  few_shot_example: |
    Field name: "alternatives_rejected"
    Type: array of objects
    Description: >
      From the ADR Confluence page or the ADR markdown document, extract each
      alternative design option that was explicitly considered and rejected. For
      each: (1) the option name/label as written, (2) a 1-2 sentence summary of
      what it would have done, and (3) the stated rejection reason. If the ADR
      uses "Option A / B / C" labelling, preserve those labels. If rejection
      reasons are implicit (e.g. listed under "Cons"), synthesise a concise
      rejection reason from the cons list. Do not fabricate options.
    Example extracted value:
      - option: "Option B — Qdrant as primary vector store"
        summary: "Use Qdrant instead of pgvector as the vector storage backend."
        rejection_reason: >
          Adds operational complexity (separate service to manage); pgvector on
          ADB provides sufficient performance for the v1 scale target
          (<10M chunks); Qdrant migration path deferred to ADR-002 escalation
          trigger.
      - option: "Option C — Pinecone managed service"
        summary: "Use Pinecone's managed vector index."
        rejection_reason: >
          External SaaS dependency conflicts with the OCI-first mandate; no
          on-prem / private-cloud deployment path available.

eng_mgr:
  key_fields:
    - sprint_health        # Sprint velocity vs plan; RAG status
    - delivery_risk        # Engineering risks that threaten the sprint or quarter commitment
    - team_capacity        # Headcount, attrition, on-call load, leave that affects delivery
    - tech_debt_items      # Active tech-debt items burning engineering time this sprint
    - dependency_blockers  # Cross-team dependencies (design, infra, security) blocking engineers
    - shipped_highlights   # Notable completed work items worth surfacing to stakeholders
  extraction_style: >
    Engineering-management lens: delivery cadence, team capacity, and risk. Avoid
    product-feature language (that is the PM's domain). Sprint health should quantify
    (e.g. "7/10 story points delivered by day 5 of 10"). Team capacity numbers should
    be headcount-accurate. Tech-debt items should link to the Jira ticket or
    Confluence page if available. Dependency blockers must name the blocking team
    and the expected unblock date. Shipped highlights should be written for a
    non-engineering audience: describe the user-facing or operational impact, not
    the implementation mechanism. Cadence: weekly sprint rhythm.
  few_shot_example: |
    Field name: "tech_debt_items"
    Type: array of objects
    Description: >
      Extract active tech-debt items that the engineering team is spending time on
      this sprint. Source: Jira filter for the team's board filtered by label
      "tech-debt" or epic "Platform Health". For each item: (1) Jira ticket key,
      (2) one-line description of the debt and its impact, (3) estimated effort
      remaining (story points or days), and (4) whether it is blocking feature
      work. If the team's Confluence sprint page has a "Tech Debt" section, extract
      from there preferentially. Do not include closed/done items.
    Example extracted value:
      - ticket: "FAAAS-1423"
        description: >
          AdbSessionStore pool-attached path has zero unit test coverage — any
          real-backend regression ships undetected.
        effort_remaining: "3 points"
        blocks_feature_work: true
      - ticket: "FAAAS-1387"
        description: >
          Bastion SSH tunnel reconnect logic does not surface partial-failure
          state to the operator — silent retry masking real connectivity issues.
        effort_remaining: "2 points"
        blocks_feature_work: false

developer:
  key_fields:
    - component_summary    # What the component does in one paragraph
    - public_interface     # Entry points, function signatures, or API contracts exposed
    - dependencies         # What this component depends on (other modules, external services)
    - known_limitations    # Documented limitations, stub-only paths, or missing features
    - test_coverage_notes  # What is tested, what is not, and what the test gaps are
    - change_log           # Recent significant changes (last 2-3 commits or PRs)
  extraction_style: >
    Developer-to-developer communication: assume the reader is a senior engineer
    who will read the source. Be technically precise — use actual class names,
    method names, and file paths. Public interface should list the most important
    entry points, not every method. Known limitations must be honest: if a path
    is stub-only (e.g. no ADB, no real embeddings), say so explicitly. Test
    coverage notes should be actionable: "X is not tested; add Y test when Z is
    provisioned." Change log entries should reference commit SHAs or PR numbers
    if available in the source. Cadence: per-module, updated on significant change.
  few_shot_example: |
    Field name: "known_limitations"
    Type: array of strings
    Description: >
      From the module's docstring, inline TODO comments, or the engineering wiki
      page for this component, extract every documented limitation or known gap.
      Include: (1) stub-only code paths that require external provisioning (ADB,
      Vault, OpenAI) to activate, (2) scale assumptions baked into the
      implementation (e.g. "designed for <10K chunks per space"), and (3) any
      explicit "NOT IMPLEMENTED" or "deferred to vN" markers. Synthesise from
      comments if no dedicated section exists. Do not include aspirational TODOs
      that are not current limitations.
    Example extracted value:
      - "FilestoreSessionStore uses Jaccard overlap (lexical) not vector similarity;
         will miss semantically-equivalent-but-lexically-different intents until
         ADB + HNSW index is provisioned."
      - "OCI bastion auto-reconnect is laptop-mode only (KBF_ENV=laptop guard).
         Production environments must handle SSH tunnel expiry via their own
         infrastructure keep-alive."
      - "_EXTRACT_MAX_TOKENS is capped at 4096; schemas with >40 fields may still
         hit the ceiling on models with smaller context windows."

ops_eng:
  key_fields:
    - incident_summary     # One-paragraph narrative: what happened, when, how resolved
    - severity             # SEV1-4 or P0-P3 as stated in the incident ticket
    - affected_services    # Which Fusion SaaS services and customer pods were impacted
    - mttr                 # Mean time to resolution (minutes or hours)
    - root_cause           # Confirmed or probable root cause
    - action_items         # Follow-up action items with owner and due date
  extraction_style: >
    Operational precision: exact timestamps, exact service names (use the canonical
    Fusion service name, not informal nicknames), and exact metrics (MTTR in
    minutes/hours, pods affected as a count). Root cause must be stated as a
    causal chain if known: "X happened because Y which caused Z." If root cause
    is still under investigation, state that explicitly — do not guess. Action
    items must be time-bound and assigned. Severity must match the incident
    management taxonomy (do not invent your own scale). Affected-services should
    list the Oracle Fusion module (e.g. Financials Cloud, HCM, SCM) plus the
    infrastructure layer (OCI region, ADB tier). Cadence: per-incident, not periodic.
  few_shot_example: |
    Field name: "root_cause"
    Type: string
    Description: >
      Extract the confirmed or probable root cause of the incident from the Jira
      incident ticket or the post-mortem Confluence page. If a formal RCA section
      exists, use it verbatim (truncated to 500 chars if necessary). If no formal
      RCA exists, synthesise from the "What happened" and "Timeline" sections:
      identify the initiating event, the propagation mechanism, and the failure
      mode. If root cause is listed as "TBD" or "under investigation", return
      that phrase verbatim rather than guessing. Prefix confirmed root causes with
      "[Confirmed]" and probable root causes with "[Probable]".
    Example extracted value: >
      [Confirmed] OCI Compute quota exhaustion in eu-frankfurt-1 prevented the
      auto-scaling group from launching replacement pods during the 26ai patching
      window. The pod count fell below the minimum healthy threshold, triggering
      Fusion Financials read-only mode for 47 minutes. Root cause was an approved
      quota increase request that had not yet been applied when the patching
      window opened.

ops_mgr:
  key_fields:
    - service_health_summary # Fleet-level health: % pods healthy, SLA compliance
    - top_incidents          # Top 2-3 incidents this period by impact
    - sla_compliance         # SLA metrics vs target (availability %, P1 MTTR)
    - capacity_outlook       # Upcoming capacity needs or risks (provisioning queue)
    - team_load              # On-call rotation load, toil metrics, escalation count
    - improvement_priorities # Top 2-3 operational improvement actions this quarter
  extraction_style: >
    Operations-management lens: fleet-wide aggregates, not per-incident detail.
    SLA compliance must cite the target (e.g. "99.9% availability target") and
    the actual achieved value with the measurement period. Top incidents should
    be 1-2 sentence summaries with severity and customer-impact scope — not full
    RCAs. Capacity outlook should quantify: "N new pods requested; provisioning
    lead time M weeks." Team load should include on-call count and any toil-
    reduction wins. Improvement priorities should be outcome-oriented: "Reduce
    P2 MTTR from 4h to 2h by Q3." Cadence: monthly or quarterly.
  few_shot_example: |
    Field name: "sla_compliance"
    Type: object
    Description: >
      Extract SLA compliance metrics for the reporting period from the ops
      manager's Confluence summary page or the SLA dashboard export. Required
      sub-fields: (1) reporting_period (e.g. "April 2026"), (2)
      availability_target (e.g. "99.9%"), (3) availability_actual (e.g. "99.87%"),
      (4) p1_mttr_target_hours, (5) p1_mttr_actual_hours, (6) sla_met (boolean).
      If the source has multiple customer tiers (Gold/Silver/Bronze SLA), extract
      the worst-performing tier and note the tier name. If any sub-field is not
      available in the source, set it to null — do not fabricate.
    Example extracted value:
      reporting_period: "April 2026"
      availability_target: "99.9%"
      availability_actual: "99.87%"
      p1_mttr_target_hours: 4
      p1_mttr_actual_hours: 5.2
      sla_met: false
      note: "Gold tier — one P1 incident (INC-2026-0412) exceeded MTTR target by 1.2h"

service_owner:
  key_fields:
    - service_description  # What the service does; which Fusion modules it supports
    - operational_status   # Current health status (healthy / degraded / maintenance)
    - owner_team           # Team responsible and primary contact
    - dependencies         # Upstream services and infrastructure this service depends on
    - known_risks          # Service-level risks with mitigation status
    - runbook_links        # Links to relevant runbooks or playbooks for this service
  extraction_style: >
    Service-ownership lens: the reader is either a new on-call engineer learning
    the service or a stakeholder asking "who owns X and is it healthy?" Be
    unambiguous about ownership (named team and individual). Operational status
    should include a last-updated timestamp if available. Dependencies must
    distinguish between hard dependencies (service fails without them) and soft
    dependencies (degraded but functional). Known risks should each have a status
    (open / mitigated / accepted). Runbook links should be real Confluence or
    wiki URLs — do not fabricate. Cadence: per-service page, updated on change.
  few_shot_example: |
    Field name: "dependencies"
    Type: array of objects
    Description: >
      From the service's Confluence page or the service catalogue entry, extract
      all upstream dependencies. For each: (1) the dependency name (service or
      infrastructure), (2) whether it is a hard dependency (service fails without
      it) or soft (degraded mode), (3) the owner team of the dependency, and (4)
      a brief description of what capability it provides. If the page lists
      dependencies in a table, extract from the table. If they are embedded in
      prose, synthesise from sentences like "X relies on Y for Z." Do not include
      this service itself as a dependency.
    Example extracted value:
      - name: "Oracle 23ai Autonomous Database (ADB)"
        dependency_type: "hard"
        owner_team: "OCI Database Platform"
        provides: "Session persistence, skill artifact storage, vector index"
      - name: "OCI Vault"
        dependency_type: "hard"
        owner_team: "Cloud Security"
        provides: "API credentials, encryption keys for ADB wallet"
      - name: "Confluence (Atlassian Cloud)"
        dependency_type: "soft"
        owner_team: "IT / Platform Tools"
        provides: "Knowledge source ingestion; framework degrades to cached content if unavailable"

kbf_ops:
  key_fields:
    - session_quality_summary  # Overall quality rating and one-line verdict
    - schema_coverage          # Fraction of declared fields successfully extracted
    - faithfulness_score       # Faithfulness metric and any failing fields
    - prompt_gap_findings      # Specific prompt or schema weaknesses identified
    - recommended_actions      # Concrete changes to schema, prompts, or sources
    - session_metadata         # synth_id, persona, skill_name, eval iteration count
  extraction_style: >
    KBF operations lens: this persona reviews authorSkill sessions for quality and
    diagnoses extraction failures. Be diagnostic and precise. Schema coverage must
    be a fraction with numerator and denominator (e.g. "7/9 fields extracted").
    Faithfulness score must identify which specific fields failed and why (e.g.
    "orm_status: extracted value not grounded in source snippet — LLM hallucinated
    RAG colour"). Prompt gap findings should name the specific prompt constant
    (e.g. `_DESIGN_SKILL_PROMPT`) and the line of reasoning that failed. Recommended
    actions must be implementation-ready: "Update field description for 'blocking_issues'
    to specify that blockers should be synthesised from WBS table status cells, not
    only from explicitly labelled 'Blockers' sections." Cadence: per reviewed session.
  few_shot_example: |
    Field name: "prompt_gap_findings"
    Type: array of objects
    Description: >
      From the session review data (eval JSONL, session transcript, or reviewSkillSession
      output), identify specific gaps in the prompts or schema that caused extraction
      failures. For each finding: (1) the affected prompt or schema element, (2) the
      observed failure (what the LLM did instead of what was expected), (3) the likely
      cause (e.g. ambiguous instruction, missing confidence level, no few-shot example),
      and (4) a severity rating (high / medium / low based on impact on artifact quality).
      Ground each finding in observed evidence from the session — do not speculate beyond
      what the session data shows.
    Example extracted value:
      - element: "_DESIGN_SKILL_PROMPT — synthesisable field inclusion rule"
        failure: >
          'risks' and 'next_steps' were excluded from the generated schema because
          INSPECT_SOURCES returned confidence=medium for WBS table content, and the
          prompt's inclusion rule only allowed high/medium verbatim fields. The WBS
          table content was present but required synthesis across multiple rows.
        likely_cause: >
          No 'synthesisable' confidence level existed at INSPECT_SOURCES time;
          the prompt rule treated synthesisable content the same as absent content.
        severity: "high"
      - element: "_CAPTURE_INTENT_PROMPT — ambiguity classification"
        failure: >
          'which Confluence space?' was listed as an ambiguity but classified as
          nice_to_know; user typed 'ok' and the state advanced without resolution.
          The resulting schema used the wrong space (FA-LEGACY instead of FAAAS).
        likely_cause: >
          Prompt did not distinguish blocking_ambiguities (prevent correct schema
          design) from nice_to_know (can proceed with assumption). All ambiguities
          were treated as advisory.
        severity: "high"
