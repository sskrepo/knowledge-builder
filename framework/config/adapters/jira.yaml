# Jira adapter — quad-mode per ADR-011 / ADR-020.
# Flip mode: native | mcp | codex_cli | codex_proxy.
adapter: jira
mode: native                              # native | mcp | codex_cli | codex_proxy

native:
  base_url: https://jira.mycompany.internal
  auth:
    type: bearer_token
    token_secret: vault://kb/jira-readonly
  pagination: { page_size: 100 }
  rate_limit: { requests_per_minute: 200 }
  webhook:
    receiver_path: /webhooks/jira
    shared_secret: vault://kb/jira-webhook-secret
  issuetypes_supported: [Bug, Incident, Story, Epic, Feature, Release]

mcp:
  endpoint: https://jira-mcp.mycompany.internal/mcp
  auth:
    type: bearer_token
    token_secret: vault://kb/jira-mcp-token
  tool_map:
    search_issues: jira.search
    get_issue: jira.get_issue
    list_comments: jira.list_comments
    list_attachments: jira.list_attachments
  required_capabilities: [search_issues, get_issue]
  rate_limit: { requests_per_minute: 60 }
  cache_ttl_seconds: 300
  poll_interval_seconds: 300

# codex_cli:                              # ADR-020 — laptop-only stdio MCP transport
#   server_name: jira                    # matches [[mcpServers]] name in ~/.codex/config.toml
#   config_path: ~/.codex/config.toml   # default; override if Codex installed non-standard
#   tool_map:                           # same structure as mcp.tool_map
#     search_issues: jira.search
#     get_issue: jira.get_issue
#     list_comments: jira.list_comments
#     list_attachments: jira.list_attachments
#   required_capabilities: [search_issues, get_issue]
#   timeout_seconds: 60
#   max_retries: 2
#   poll_interval_seconds: 300          # no webhook support in codex_cli mode
#
# Use codex_cli only when the upstream MCP server is registered in Codex
# with a SPAWN COMMAND (i.e. `codex mcp add <name> -- <cmd> <args...>`).
# For Codex-registered HTTPS+OAuth servers (e.g. `central_jira`) there is
# no spawn command, so use codex_proxy below instead.

# codex_proxy:                            # ADR-020 amended — LLM-mediated via `codex mcp-server`
#   server_name: central_jira            # name registered with `codex mcp add` (HTTPS+OAuth)
#   codex_bin: codex                     # default; the codex CLI binary on PATH
#   timeout_seconds: 180                 # per-call; Codex LLM session is slow (30-60s typical)
#   max_issues_per_list: 50              # cap per list() call to keep prompts bounded
# # NOTE: each call runs a Codex LLM session (~1-3k tokens). Use for laptop dev / demos only.
