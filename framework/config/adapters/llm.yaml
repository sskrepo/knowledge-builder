# LLM provider config — per ADR-014
# Provider switch: oci_genai (default; AIRA-aligned) | openai_direct (local-dev fallback)
provider: oci_genai

# === OCI Generative AI Inference (PRIMARY PATH) ============================
# Region: eu-frankfurt-1 (aligned with ADB + bastion, same tenancy)
# Tenancy: adpcpprod  (ocid1.tenancy.oc1..aaaaaaaau5s6...)
# Model: Oracle GPT-5 (on-demand serving, EU Frankfurt)
#
# Laptop/dev overrides live in framework/config/laptop.yaml [llm] section:
#   auth: config_file
#   config_profile: adpcpprod
#
# Prod / OCI Compute overrides:
#   auth: instance_principal  (no config file needed)
oci_genai:
  endpoint: https://inference.generativeai.eu-frankfurt-1.oci.oraclecloud.com
  # Compartment OCID for billing / IAM scope (adpcpprod tenancy)
  compartment_ocid: ocid1.tenancy.oc1..aaaaaaaau5s6lj67ia5vy6qjglhvquqdszjqlmvlmsetu4jrtjni4mng6hea
  # auth: instance_principal (OCI Compute / Functions)
  #       config_file        (laptop — uses ~/.oci/config + config_profile below)
  auth: instance_principal
  config_profile: DEFAULT     # only used when auth: config_file

  models:
    # Oracle GPT-5 (EU Frankfurt on-demand serving)
    # OCID source: GenAI_modelgpt5_2.py smoke-test
    chat:      ocid1.generativeaimodel.oc1.eu-frankfurt-1.amaaaaaask7dceya3ky2tq47f4syiiqm2p4skqcwtav7jyvcl322w36dx4kq
    synthesis: ocid1.generativeaimodel.oc1.eu-frankfurt-1.amaaaaaask7dceya3ky2tq47f4syiiqm2p4skqcwtav7jyvcl322w36dx4kq
    eval_judge: ocid1.generativeaimodel.oc1.eu-frankfurt-1.amaaaaaask7dceya3ky2tq47f4syiiqm2p4skqcwtav7jyvcl322w36dx4kq
    # Embedding — OCI Cohere v3 (same region); fallback to openai.text-embedding-3-large
    embedding: cohere.embed-multilingual-v3.0

  retries: 3
  timeout_s: 120              # GPT-5 can be slower than GPT-4o for long prompts
  rate_limit:
    requests_per_minute: 60   # on-demand tier default; increase when quota upgraded

# === Direct OpenAI (FALLBACK; local dev only) ==============================
openai_direct:
  api_key_secret: vault://kb/openai-api-key
  org_id_secret: vault://kb/openai-org-id
  project_id_secret: vault://kb/openai-project-id
  models:
    chat: gpt-4o
    synthesis: gpt-4o
    eval_judge: gpt-4o
    embedding: text-embedding-3-large
  default_timeout_seconds: 60
  retries: 3
