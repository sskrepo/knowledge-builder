env: prod
region: us-ashburn-1
adb:
  service_name: kbf_prod_high
  wallet_path: /opt/kb/wallet/prod/
  admin_user: ADMIN
  admin_password_secret: vault://kb/adb-admin-prod
  schemas:
    kb_incidents: { user: KB_INCIDENTS_RW, password_secret: vault://kb/kb-incidents-rw-prod }
    kb_wiki_meta: { user: KB_WIKI_RW, password_secret: vault://kb/kb-wiki-rw-prod }
    kb_code: { user: KB_CODE_RW, password_secret: vault://kb/kb-code-rw-prod }
    kb_fa_semantic: { user: KB_FA_RW, password_secret: vault://kb/kb-fa-rw-prod }
    kb_shim: { user: KB_SHIM_RW, password_secret: vault://kb/kb-shim-rw-prod }

# ---- Bug DB (DECISION-009) ---------------------------------------------------
# For prod scale-out, add dsn/wallet_path here to point at a dedicated bug ADB.
# For now inherits adb connection; different user only.
bug_db:
  user: KBF_BUGS
  password_secret: vault://kb/kbf-bugs-prod

vault:
  vault_ocid: ocid1.vault.oc1.iad.YOUR_PROD_VAULT
  master_key_ocid: ocid1.key.oc1.iad.YOUR_PROD_KEY
  compartment_ocid: ocid1.compartment.oc1..YOUR_PROD_COMP
object_storage:
  namespace: axq4m61mcei3
  bucket: kb-raw-prod
  lifecycle_days: 365

# ---- Artifact Store (uploadArtifact MCP tool; per ADR-021) -------------------
artifact_store:
  mode: oci
  max_file_size_mb: 10
  oci:
    namespace: axq4m61mcei3
    bucket: kbf-uploads                 # OCID: ocid1.bucket.oc1.eu-frankfurt-1.aaaaaaaah3kxe5ldbr5sny5phrtidoaxgorfbusqxojdnicpf46lxe6ckqrq
    region: eu-frankfurt-1
    compartment_ocid: ocid1.compartment.oc1..aaaaaaaax7wbfdtfl7axhfae7q5lwvrmf2nlcdii3scarukqmuos7u5mokla
streaming:
  stream_ocid: ocid1.stream.oc1.iad.YOUR_PROD_STREAM
  bootstrap_servers: cell-1.streaming.us-ashburn-1.oci.oraclecloud.com:9092
compute:
  mcp_server_endpoint: https://kb.mycompany.internal
  health_check_path: /healthz
functions:
  app_ocid: ocid1.fnapp.oc1.iad.YOUR_PROD_FN
  ingestion_function: kb-ingest-prod
openai:
  api_key_secret: vault://kb/openai-api-key
  org_id_secret: vault://kb/openai-org-id
  project_id_secret: vault://kb/openai-project-id
  models: { parser: gpt-4o, synthesis: gpt-4o, eval_judge: gpt-4o, embedding: text-embedding-3-large }
  spend_cap_usd_per_month: 2000
  rate_tier: 4
observability: { cost_telemetry_table: kb_shim.cost_log, log_level: INFO }
eval:
  baseline_storage: oci://kb-raw-prod/eval/baselines/
  artifact_storage: oci://kb-raw-prod/eval/runs/
  ci_token_cap_per_pr_usd: 20

# ---- Orchestrator routing thresholds (per ADR-006 amend 3) ---------------
orchestrator:
  routing_thresholds:
    tier1_workflow_match: 0.85
    tier2_kb_retrieval: 0.60
    tier3_multi_persona: 0.40
    tier4_no_answer_floor: 0.30

# ---- OCI Generative AI Inference (LLM provider per ADR-014) -------------
oci_genai:
  endpoint: https://inference.generativeai.us-ashburn-1.oci.oraclecloud.com
  # compartment defaults to vault.compartment_ocid above
  auth: instance_principal
  models:
    chat: openai.gpt-4o
    synthesis: openai.gpt-4o
    eval_judge: openai.gpt-4o
    embedding: openai.text-embedding-3-large
