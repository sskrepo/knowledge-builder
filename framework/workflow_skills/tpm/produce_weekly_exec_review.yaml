workflow_skill: produce_weekly_exec_review
persona: tpm
status: draft
trigger:
  on_request:
    enabled: true
    inputs:
    - name: input
      type: string
      description: Query or filter input
    output_format: markdown
    response_mode: artifact_url
skill_card:
  summary: produce weekly exec review
  use_when: 'User asks for: produce weekly exec review'
  example_invocations:
  - produce weekly exec review
  do_not_use_for: Single-fact lookups (use vector_search). Live operational data (use
    query_fleet).
requires_extractions:
- kb: tpm.produce_weekly_exec_review_data
  required_fields:
  - rag_status
- kb: tpm.tpm_weekly_ops
  required_fields:
  - week_id
  - blockers
synthesis:
  output_format: markdown
  template: synthesis/templates/produce_weekly_exec_review.markdown
  slide_mapping: synthesis/mappings/produce_weekly_exec_review.yaml
  field_mapping:
    week_id:
      section: Week Id
      source_field: week_id
    rag_status:
      section: Rag Status
      source_field: rag_status
    blockers:
      section: Blockers
      source_field: blockers
delivery:
  kind: filesystem
  path: ~/.kbf/outputs/produce_weekly_exec_review.markdown
eval:
  gold_set: eval/gold_sets/tpm-produce_weekly_exec_review-workflow.jsonl
  exit_criteria:
    field_accuracy: 0.85
    delivery_success_rate: 0.99
