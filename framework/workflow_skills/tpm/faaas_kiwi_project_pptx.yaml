workflow_skill: faaas_kiwi_project_pptx
persona: tpm
status: draft
trigger:
  on_request:
    enabled: true
    inputs:
    - name: query
      type: string
      description: User query or request. The skill retrieves data from the fixed
        confluence_page source.
      required: true
    output_format: pptx
    response_mode: artifact_url
skill_card:
  summary: Generates an exec-ready Kiwi Project status slide in a new PPTX, populated
    from the fixed FAaaS Kiwi Project Confluence page and formatted to match the reference
    slide style.
  use_when: Use when you need to generate a new PPTX status slide (composite exec
    update) for the FAaaS Kiwi Project that includes orm_status, rag_summary, schedule_health,
    blocking_issues, next_steps, and exec_asks in a reference-matching layout.
  example_invocations:
  - Generate a Kiwi Project LCM update slide as a pptx for exec review, using the
    latest from the FAaaS Kiwi Project Confluence page.
  - Create an exec-ready Kiwi Project status slide pptx (RAG, schedule health, blockers,
    next steps, exec asks) in the same style as our standard Kiwi slide.
  do_not_invoke_if_phrases:
  - what is the current rag
  - what is the schedule health
  - give me a text summary
  routing_queries:
    positive:
    - Produce a new pptx with the Kiwi Project exec status slide (orm_status, rag_summary,
      schedule_health, blockers, next steps, exec asks) sourced from the FAaaS Kiwi
      Project Confluence page.
    - Generate the Kiwi Project LCM update slide as a pptx in the standard reference
      layout for an exec readout.
    - Create an exec-ready Kiwi Project status slide pptx using the fixed Confluence
      page as the source of truth.
    - I need a PPTX slide for the FAaaS Kiwi Project update—include RAG summary, schedule
      health, blocking issues, next steps, and exec asks.
    - Build a new pptx containing the Kiwi Project update slide formatted like our
      reference Kiwi slide for leadership.
    negative:
    - What is the Kiwi Project schedule_health right now?
    - Generate a pptx for the FAaaS Mango project update.
    - Draft an email summary of the Kiwi Project status (no pptx).
requires_extractions:
- kb: tpm.faaas_kiwi_project_pptx
  required_fields:
  - report_title
  - reporting_date
  - project_purpose
  - rag_summary
  - orm_status
  - schedule_health
  - metrics_snapshot
  - workstreams_summary
  - next_steps
  - decisions_needed
  - key_links
  - do_not_invoke_if_phrases
  - capacity_constraints
  - dependencies_external_teams
- kb: tpm.tpm_weekly_ops
  required_fields:
  - blocking_issues
  - exec_asks
synthesis:
  output_format: pptx
  template: synthesis/templates/faaas_kiwi_project_pptx.pptx
  slide_mapping: synthesis/mappings/faaas_kiwi_project_pptx.yaml
  layout: weekly_exec_review_v1
  field_mapping:
    report_title:
      section: Report Title
      source_field: report_title
    reporting_date:
      section: Reporting Date
      source_field: reporting_date
    project_purpose:
      section: Project Purpose
      source_field: project_purpose
    rag_summary:
      section: Rag Summary
      source_field: rag_summary
    orm_status:
      section: Orm Status
      source_field: orm_status
    schedule_health:
      section: Schedule Health
      source_field: schedule_health
    metrics_snapshot:
      section: Metrics Snapshot
      source_field: metrics_snapshot
    workstreams_summary:
      section: Workstreams Summary
      source_field: workstreams_summary
    blocking_issues:
      section: Blocking Issues
      source_field: blocking_issues
    next_steps:
      section: Next Steps
      source_field: next_steps
    exec_asks:
      section: Exec Asks
      source_field: exec_asks
    decisions_needed:
      section: Decisions Needed
      source_field: decisions_needed
    key_links:
