workflow_skill: faaas_kiwi_project_pptx
persona: tpm
status: draft
trigger:
  on_request:
    enabled: true
    inputs:
    - name: input
      type: string
      description: Query or filter input
    output_format: pptx
    response_mode: artifact_url
skill_card:
  summary: Generates an exec-ready weekly FAaaS Kiwi Project executive review deck
    (pptx) pulled from the fixed Confluence source, including status, RAG summary,
    schedule health, blockers, next steps, and exec asks.
  use_when: Invoke this when you need to publish the weekly executive review PPTX
    for the FAaaS Kiwi Project and want it compiled directly from the authoritative
    Confluence page as the single source of truth.
  example_invocations:
  - Generate this week’s FAaaS Kiwi Project executive review deck as a pptx from the
    fixed Confluence page, including ORM status, RAG summary, schedule health, blockers,
    next steps, and exec asks.
  - I need the weekly exec review for FAaaS Kiwi Project in pptx—pull the latest from
    Confluence and include status, schedule health, blocking issues, next steps, and
    exec asks.
  routing_queries:
    positive:
    - Build the weekly FAaaS Kiwi Project exec review pptx from the fixed Confluence
      source with ORM status, RAG summary, schedule health, blockers, next steps,
      and exec asks.
    - Create an executive-ready weekly review deck (pptx) for the FAaaS Kiwi Project
      using the Confluence page as the source of truth—include RAG, schedule health,
      blocking issues, next steps, and exec asks.
    - Export this week’s FAaaS Kiwi Project weekly status into a pptx exec deck from
      Confluence, with ORM status and a concise RAG summary plus blockers and asks.
    - Generate the FAaaS Kiwi Project weekly executive update pptx from the fixed
      Confluence page, including schedule health, blocking issues, next steps, and
      exec asks.
    - Produce the weekly exec review PPTX for FAaaS Kiwi Project based on the fixed
      Confluence source, with ORM status, RAG summary, schedule health, blockers,
      next steps, and exec asks.
    negative:
    - Draft a quarterly roadmap presentation for the Android app redesign project.
    - What is the current RAG status for the FAaaS Kiwi Project?
    - Write a one-page weekly status email for FAaaS Kiwi Project from Confluence
      (not a pptx).
requires_extractions:
- kb: tpm.faaas_kiwi_project_pptx
  required_fields:
  - week_id
  - program_name
  - program_purpose
  - orm_status
  - rag_summary
  - schedule_health
  - key_metrics
  - blocking_issues
  - next_steps
  - workstream_status_snapshot
  - leadership_decisions_needed
  - dependencies_and_ers
  - links_index
  - owners_and_contacts
- kb: tpm.tpm_weekly_ops
  required_fields:
  - exec_asks
synthesis:
  output_format: pptx
  template: synthesis/templates/faaas_kiwi_project_pptx.pptx
  slide_mapping: synthesis/mappings/faaas_kiwi_project_pptx.yaml
  layout: weekly_exec_review_v1
  field_mapping:
    week_id:
      section: Week Id
      source_field: week_id
    program_name:
      section: Program Name
      source_field: program_name
    program_purpose:
      section: Program Purpose
      source_field: program_purpose
    orm_status:
      section: Orm Status
      source_field: orm_status
    rag_summary:
      section: Rag Summary
      source_field: rag_summary
    schedule_health:
      section: Schedule Health
      source_field: schedule_health
    key_metrics:
      section: Key Metrics
      source_field: key_metrics
    blocking_issues:
      section: Blocking Issues
      source_field: blocking_issues
    next_steps:
      section: Next Steps
      source_field: next_steps
    exec_asks:
      section: Exec Asks
      source_field: exec_asks
    workstream_status_snapshot:
      section: Workstream Status Snapshot
      source_field: workstream_status_snapshot
    leadership_decisions_needed:
      section: Leadership Decisions Needed
      source_field: leadership_decisions_needed
    dependencies_and_ers:
      section: Dependencies And Ers
      source_field: dependencies_and_ers
    links_index:
      section: Links Index
      source_field: links_index
    owners_and_contacts:
      section: Owners And Contacts
      source_field: owners_and_contacts
delivery:
  kind: filesystem
  path: ~/.kbf/outputs/faaas_kiwi_project_pptx.pptx
eval:
