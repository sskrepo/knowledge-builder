workflow_skill: faaas_kiwi_project_pptx
persona: tpm
status: draft
trigger:
  on_request:
    enabled: true
    inputs:
    - name: query
      type: string
      description: User query or request. The skill retrieves data from the fixed
        confluence_page source.
      required: true
    output_format: pptx
    response_mode: artifact_url
skill_card:
  summary: Generates an exec-ready Kiwi Project LCM update slide deck (pptx) using
    only the FAaaS Kiwi Project Confluence page as the source, formatted to match
    the provided reference slide style.
  use_when: Invoke this when you need an on-demand, presentation-ready Kiwi Project
    status update (pptx) for execs that mirrors the established slide layout and includes
    standard TPM fields (ORM status, RAG, schedule health, blockers, next steps, exec
    asks).
  example_invocations:
  - Generate a Kiwi Project LCM update slide as a pptx for exec review, matching the
    reference Kiwi slide layout and pulling content only from the FAaaS Kiwi Project
    Confluence page.
  - I need an exec-ready Kiwi Project status update pptx (ORM status, RAG summary,
    schedule health, blockers, next steps, exec asks) sourced only from the FAaaS
    Kiwi Project Confluence page—please format like the existing Kiwi slide.
  routing_queries:
    positive:
    - Create a pptx Kiwi Project LCM update slide for execs, matching the existing
      Kiwi slide style and using only the FAaaS Kiwi Project Confluence page as content.
    - Generate an exec status slide pptx for FAaaS Kiwi Project (include ORM status,
      RAG summary, schedule health, blocking issues, next steps, exec asks) sourced
      from the OCIFACP Confluence page.
    - Produce a new Kiwi Project update pptx on demand, formatted like the reference
      Kiwi slide, with content pulled strictly from the FAaaS Kiwi Project Confluence
      page.
    - Make a Kiwi Project LCM update pptx in the same layout as the standard Kiwi
      slide and populate it from the FAaaS Kiwi Project Confluence page only.
    - Build an exec-ready Kiwi Project status pptx (RAG, schedule health, blockers,
      next steps, exec asks) using the FAaaS Kiwi Project Confluence page as the single
      source of truth.
    negative:
    - Create a Q3 roadmap slide deck for OCI Networking and include competitive analysis.
    - What is the current RAG status for the Kiwi Project?
    - Write a one-page Kiwi Project LCM update as a Confluence page (not a pptx).
requires_extractions:
- kb: tpm.faaas_kiwi_project_pptx
  required_fields:
  - reporting_date
  - project_name
  - project_purpose
  - rag_summary
  - schedule_health
  - orm_status
  - status_highlights
  - workstreams
  - blocking_issues
  - next_steps
  - key_metrics
  - key_links
- kb: tpm.tpm_weekly_ops
  required_fields:
  - exec_asks
synthesis:
  output_format: pptx
  template: synthesis/templates/faaas_kiwi_project_pptx.pptx
  slide_mapping: synthesis/mappings/faaas_kiwi_project_pptx.yaml
  layout: weekly_exec_review_v1
  field_mapping:
    reporting_date:
      section: Reporting Date
      source_field: reporting_date
    project_name:
      section: Project Name
      source_field: project_name
    project_purpose:
      section: Project Purpose
      source_field: project_purpose
    rag_summary:
      section: Rag Summary
      source_field: rag_summary
    schedule_health:
      section: Schedule Health
      source_field: schedule_health
    orm_status:
      section: Orm Status
      source_field: orm_status
    status_highlights:
      section: Status Highlights
      source_field: status_highlights
    workstreams:
      section: Workstreams
      source_field: workstreams
    blocking_issues:
      section: Blocking Issues
      source_field: blocking_issues
    next_steps:
      section: Next Steps
      source_field: next_steps
    exec_asks:
      section: Exec Asks
      source_field: exec_asks
    key_metrics:
      section: Key Metrics
      source_field: key_metrics
    key_links:
      section: Key Links
      source_field: key_links
delivery:
  kind: filesystem
  path: ~/.kbf/outputs/faaas_kiwi_project_pptx.pptx
eval:
  gold_set: eval/gold_sets/tpm-faaas_kiwi_project_pptx-workflow.jsonl
  exit_criteria:
    field_accuracy: 0.85
    delivery_success_rate: 0.99
source_binding:
  mode: author_fixed
  source_type: confluence_page
  pinned_ref: https://confluence.oraclecorp.com/confluence/display/OCIFACP/FAaaS+Kiwi+Project
  space_allow_list:
  - OCIFACP
  ingest_on_demand: false
