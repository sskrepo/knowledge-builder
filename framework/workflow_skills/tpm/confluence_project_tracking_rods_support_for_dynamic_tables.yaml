workflow_skill: confluence_project_tracking_rods_support_for_dynamic_tables
persona: tpm
status: draft
trigger:
  on_request:
    enabled: true
    inputs:
    - name: page_id
      type: confluence_page_ref
      description: Confluence pageId or full page URL of the page to use
      required: true
    output_format: email
    response_mode: artifact_url
skill_card:
  summary: Produces a draft stakeholder status meeting agenda email (.eml) from a
    Confluence project tracking page URL, pre-filled with RAG, schedule health, blockers,
    dependencies, next steps, exec asks, and a per-stakeholder status roll-call.
  use_when: Use ONLY when you need to generate a draft stakeholder status meeting
    agenda in EMAIL (.eml) format—not a slide deck, not a PPTX presentation, not a
    plain-text summary. The output must be an RFC-822 .eml email draft that compiles
    multiple sections (RAG summary, schedule health, blockers with owners/ETAs, dependencies,
    next steps, exec asks, and per-stakeholder roll-call) from a Confluence tracking
    page. Do NOT invoke this skill if the request asks for a slide deck, PowerPoint
    presentation, PPTX, or any non-email format—even if it mentions "agenda" or "meeting".
  example_invocations:
  - 'Draft an agenda email (.eml) for the RODS Support for Dynamic Tables stakeholder
    status meeting using this Confluence tracking page: https://confluence.example.com/x/abcd
    — send it as a prep note 2 days ahead.'
  - 'Generate a meeting-prep agenda email (.eml draft only) from this Confluence project
    tracking URL and include RAG, schedule health, blockers/owners/ETAs, dependencies,
    next steps, exec asks, and a roll-call: https://confluence.example.com/x/abcd'
  do_not_invoke_if_phrases:
  - what is the current rag
  - what is the schedule health
  - slide deck
  - slide deck agenda
  - powerpoint
  - pptx
  - presentation
  - make a presentation
  routing_queries:
    positive:
    - 'Create a draft agenda email (.eml) for next week’s stakeholder status meeting
      from this Confluence project tracking page URL: https://confluence.example.com/x/abcd,
      framed as a prep email 3 days ahead.'
    - Generate an .eml draft email agenda from the Confluence tracking page for RODS
      Support for Dynamic Tables and include RAG summary, schedule health, blockers
      with owners/ETAs, dependencies, next steps, exec asks, and a roll-call.
    - 'I need a meeting preparation email (.eml draft) based on this Confluence project
      tracker: https://confluence.example.com/x/abcd — include blockers, dependencies,
      and per-team status requests with owners and ETAs.'
    - 'Draft the stakeholder status meeting agenda email (.eml) using this Confluence
      URL and make sure it has RAG, schedule health, next steps, exec asks, and a
      roll-call section: https://confluence.example.com/x/abcd.'
    - 'Turn this Confluence project tracking page into a draft agenda email (.eml)
      for stakeholders, to be sent 1 day before the meeting, with blockers/owners/ETAs
      and dependency callouts: https://confluence.example.com/x/abcd.'
    negative:
    - For RODS Support for Dynamic Tables, what is the current RAG status on the Confluence
      tracker?
    - Write a Jira JQL query to find open blockers for Dynamic Tables replication.
    - Make a slide deck agenda for the stakeholder status meeting based on the Confluence
      page.
    - Create a PowerPoint presentation summarising the RODS Support project status
      from the Confluence tracking page.
    - Build a deck for the stakeholder meeting that includes blockers and next steps
      from the Confluence tracker.
